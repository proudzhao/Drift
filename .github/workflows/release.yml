name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.0"
        required: true
        default: "v0.1.0"

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"
          - platform: windows-latest
            args: "--bundles nsis,msi"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: drift/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./drift/src-tauri -> target"

      - name: Install dependencies
        run: npm ci
        working-directory: drift

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: drift
          tagName: ${{ github.event.inputs.tag }}
          releaseName: "Drift ${{ github.event.inputs.tag }}"
          releaseBody: "Drift desktop danmaku overlay preview release."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
